<!doctype html>
<html lang="tr">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProfessorCat Browser</title>
  <style>
    /* Tüm mevcut CSS aynen korunuyor, değiştirmiyoruz */
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 </head>
 <body>
  <div class="browser-container">
   <!-- Demo uyarısı -->
   <div class="demo-warning">
    ⚠️ Bu bir demo/tarayıcı simülasyonudur - Eğlence amaçlıdır
   </div>
   <!-- Browser Header -->
   <div class="browser-header">
    <div class="browser-buttons">
     <button class="nav-button" onclick="goBack()">←</button>
     <button class="nav-button" onclick="goForward()">→</button>
     <button class="nav-button" onclick="reload()">↻</button>
    </div>
    <div class="address-bar">
     <span class="address-bar-icon">🔒</span>
     <span>https://www.professorcatsearch.com</span>
    </div>
   </div>
   <!-- Browser Content -->
   <div class="browser-content" id="browserContent">
    <div class="search-page">
     <div class="search-logo">🐱</div>
     <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="ProfessorCat'ta ara..." onkeypress="handleSearch(event)">
      <button class="search-button" onclick="performSearch()">Ara</button>
     </div>
    </div>
   </div>
  </div>

  <!-- Alert Modal -->
  <div class="alert-overlay" id="alertOverlay" style="display: none;">
   <div class="alert-box">
    <div class="alert-icon">🐱</div>
    <div class="alert-title">ProfessorCat uyarısı!</div>
    <div class="alert-message">Bu arama sonuçları ProfessorCat tarafından işlenmiştir. Devam etmek için tıklayın.</div>
    <button class="alert-button" onclick="confirmAlert()">Devam Et</button>
   </div>
  </div>

  <script>
    // ==============================
    // Tarayıcı ve arama kısmı
    // ==============================
    let lastSearchQuery = '';
    let currentTab = 'all';
    let history = [];
    let historyIndex = -1;
    let canvaLink = 'https://www.canva.com/design/DAGrke6nXUY/OdOciaHr0CxE1haEmn-IeA/view?utm_content=DAGrke6nXUY&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h31ec2b4051';

    function goHome() {
      history = [];
      historyIndex = -1;
      document.getElementById('browserContent').innerHTML = `
        <div class="search-page">
          <div class="search-logo">🐱</div>
          <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="ProfessorCat'ta ara..." onkeypress="handleSearch(event)">
            <button class="search-button" onclick="performSearch()">Ara</button>
          </div>
        </div>`;
    }

    function handleSearch(event) {
      if (event.key === 'Enter') performSearch();
    }

    function performSearch() {
      const input = document.getElementById('searchInput');
      const query = input ? input.value : lastSearchQuery;
      if (query.trim()) {
        lastSearchQuery = query;
        showAlert();
      }
    }

    function showAlert() {
      document.getElementById('alertOverlay').style.display = 'flex';
    }

    function confirmAlert() {
      document.getElementById('alertOverlay').style.display = 'none';
      showResults();
    }

    function switchTab(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`${tabName}-content`).classList.add('active');
    }

    function openResult() {
      window.open(canvaLink, '_blank', 'noopener,noreferrer');
    }

    function goBack() {
      if (historyIndex > 0) {
        historyIndex--;
        const page = history[historyIndex];
        if (page.type === 'results') {
          lastSearchQuery = page.query;
          showResults();
        }
      }
    }

    function goForward() {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        const page = history[historyIndex];
        if (page.type === 'results') {
          lastSearchQuery = page.query;
          showResults();
        }
      }
    }

    function reload() {
      if (historyIndex >= 0 && history[historyIndex]) {
        const page = history[historyIndex];
        if (page.type === 'results') {
          lastSearchQuery = page.query;
          showResults();
        }
      }
    }

    // ==============================
    // AI Chat bölümü (Gerçek AI simülasyonu)
    // ==============================
    async function fetchAIResponse(question) {
      const keyWords = question.split(' ').slice(0,5).join(' ');
      const responses = [
        `Hmm, "${keyWords}" konusu oldukça ilginç! 😺`,
        `Bence "${keyWords}" üzerine biraz daha düşünmek gerekir.`,
        `"${keyWords}" hakkında farklı fikirler üretilebilir.`,
        `Bu soruyla ilgili olarak "${keyWords}" mantıklı bir yaklaşım olabilir.`,
        `"${keyWords}" gerçekten düşündürücü bir konu! 🌟`,
        `Bu konu, yani "${keyWords}", bakış açısına göre değişebilir.`
      ];
      return new Promise(res => setTimeout(() => {
        res(responses[Math.floor(Math.random() * responses.length)]);
      }, 700));
    }

    async function sendAIMessage() {
      const input = document.getElementById('aiInput');
      const message = input.value.trim();
      if (!message) return;

      const messagesContainer = document.getElementById('aiMessages');

      // Kullanıcı mesajı
      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.innerHTML = `<div class="message-bubble">${message}</div>`;
      messagesContainer.appendChild(userDiv);
      input.value = '';
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      // AI cevabı al
      const aiText = await fetchAIResponse(message);
      const aiDiv = document.createElement('div');
      aiDiv.className = 'message ai';
      aiDiv.innerHTML = `<div class="message-bubble">${aiText}</div>`;
      messagesContainer.appendChild(aiDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function handleAIMessage(event) {
      if (event.key === 'Enter') sendAIMessage();
    }

  </script>
 </body>
</html>
